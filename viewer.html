<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Archive</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--surface:#161624;--surface2:#1e1e30;
  --border:#2a2a3e;--gold:#d4a853;--gold2:#e8c46a;
  --text:#e8e0d0;--muted:#6a6580;--accent:#c0392b;
  --green:#27ae60;--radius:6px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{display:flex;flex-direction:column}

/* ── TOP BAR ── */
#topbar{
  height:52px;min-height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;
  z-index:600;padding:0 16px;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
}
#topbar h1{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;color:var(--gold);
  white-space:nowrap;margin-right:20px;
}
#topbar h1 span{font-style:italic;font-weight:400;font-size:0.85rem;color:var(--muted);margin-left:6px}

/* folder pills */
#folder-pills{display:flex;gap:6px;flex:1;overflow-x:auto;padding:4px 0;scrollbar-width:none}
#folder-pills::-webkit-scrollbar{display:none}
.pill{
  padding:4px 12px;border-radius:20px;
  border:1px solid var(--border);
  background:none;color:var(--muted);
  font-family:'DM Mono',monospace;font-size:0.67rem;
  cursor:pointer;white-space:nowrap;
  transition:all 0.18s;letter-spacing:0.5px;
}
.pill:hover{border-color:var(--gold);color:var(--gold)}
.pill.active{background:var(--gold);color:#111;border-color:var(--gold);font-weight:500}
.pill-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}

/* lang toggle */
#lang-btn{
  margin-left:12px;padding:5px 12px;
  background:none;border:1px solid var(--border);
  border-radius:var(--radius);color:var(--muted);
  font-family:'DM Mono',monospace;font-size:0.67rem;
  cursor:pointer;transition:all 0.18s;white-space:nowrap;
}
#lang-btn:hover{border-color:var(--gold);color:var(--gold)}

/* admin link */
#admin-link{
  margin-left:8px;padding:5px 12px;
  background:none;border:1px solid rgba(212,168,83,0.3);
  border-radius:var(--radius);color:rgba(212,168,83,0.6);
  font-family:'DM Mono',monospace;font-size:0.67rem;
  text-decoration:none;transition:all 0.18s;white-space:nowrap;
  display:inline-flex;align-items:center;gap:5px;
}
#admin-link:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,0.08)}

/* ── CHRONOLOGICAL YEAR SIDEBAR ── */
#year-sidebar{
  position:absolute;top:0;left:0;bottom:80px;
  width:260px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:400;
  transform:translateX(-100%);
  transition:transform 0.3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
#year-sidebar.open{transform:translateX(0);pointer-events:all;}

#year-sidebar-header{
  padding:12px 14px 10px;
  border-bottom:1px solid var(--border);
  background:var(--surface2);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  gap:6px;
}
#year-sidebar-title{
  font-family:'Playfair Display',serif;
  font-size:0.95rem;color:var(--gold);
  flex:1;
}
#year-sidebar-count{
  font-family:'DM Mono',monospace;
  font-size:0.6rem;color:var(--muted);
}

#year-sidebar-list{
  flex:1;overflow-y:auto;
  padding:8px 10px;
}

.yc-month-group{
  margin-bottom:14px;
}
.yc-month-label{
  font-family:'DM Mono',monospace;
  font-size:0.6rem;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--muted);
  padding:4px 2px 6px;
  border-bottom:1px solid var(--border);
  margin-bottom:6px;
}
.yc-entry{
  display:flex;align-items:flex-start;
  gap:10px;padding:7px 8px;
  border-radius:var(--radius);
  cursor:pointer;transition:all 0.15s;
  margin-bottom:3px;
  border:1px solid transparent;
}
.yc-entry:hover{background:var(--surface2);border-color:var(--border);}
.yc-entry.active{background:rgba(212,168,83,0.1);border-color:rgba(212,168,83,0.3);}
.yc-dot{
  width:8px;height:8px;border-radius:50%;
  flex-shrink:0;margin-top:4px;
}
.yc-info{flex:1;min-width:0;}
.yc-name{
  font-size:0.8rem;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-weight:500;
}
.yc-date{
  font-family:'DM Mono',monospace;
  font-size:0.6rem;color:var(--muted);margin-top:2px;
}
.yc-folder{
  font-size:0.62rem;color:var(--muted);
  margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ── MAP AREA ── */
#map-wrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}

/* ── TIMELINE ── */
#timeline{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent, rgba(13,13,20,0.95));
  padding:28px 24px 16px;
  z-index:500;
}
#timeline-inner{max-width:900px;margin:0 auto}

#tl-label{
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:8px;
}
#tl-year{
  font-family:'Playfair Display',serif;
  font-size:2rem;color:var(--gold);line-height:1;
}
#tl-count{
  font-family:'DM Mono',monospace;
  font-size:0.7rem;color:var(--muted);
}

/* tick marks above slider */
#tl-ticks{
  display:flex;justify-content:space-between;
  margin-bottom:4px;height:16px;position:relative;
}
.tl-tick{
  font-family:'DM Mono',monospace;font-size:0.58rem;
  color:var(--muted);text-align:center;
  position:absolute;transform:translateX(-50%);
  cursor:pointer;transition:color 0.15s;
  user-select:none;
}
.tl-tick:hover,.tl-tick.has-data{color:var(--gold2)}
.tl-tick.active{color:var(--gold) !important;font-weight:600;}
.tl-tick.active .tl-tick-mark{background:var(--gold);height:10px;width:2px;}
.tl-tick-mark{width:1px;height:6px;background:var(--border);margin:0 auto 2px}
.tl-tick.has-data .tl-tick-mark{background:var(--gold);height:8px}

#tl-slider{
  -webkit-appearance:none;appearance:none;
  width:100%;height:3px;
  background:var(--border);border-radius:2px;
  outline:none;cursor:pointer;
}
#tl-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;height:18px;border-radius:50%;
  background:var(--gold);
  border:2px solid #111;
  box-shadow:0 0 8px rgba(212,168,83,0.6);
  cursor:pointer;transition:transform 0.15s;
}
#tl-slider::-webkit-slider-thumb:hover{transform:scale(1.2)}

/* ── SIDEBAR PANEL ── */
#side-panel{
  position:absolute;top:0;right:0;bottom:60px;
  width:320px;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;
  z-index:400;
  transform:translateX(100%);
  transition:transform 0.3s cubic-bezier(.4,0,.2,1);
}
#side-panel.open{transform:translateX(0)}

#side-panel-header{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  background:var(--surface2);
}
#side-panel-title{
  font-family:'Playfair Display',serif;
  font-size:1rem;color:var(--gold);
}
#side-close{
  background:none;border:none;color:var(--muted);
  font-size:1.2rem;cursor:pointer;padding:2px 6px;
  border-radius:3px;transition:color 0.15s;
}
#side-close:hover{color:var(--text)}

#side-list{flex:1;overflow-y:auto;padding:10px}

.side-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px 12px;margin-bottom:8px;
  cursor:pointer;transition:all 0.18s;
}
.side-card:hover{border-color:var(--gold);transform:translateX(-2px)}
.side-card h3{font-family:'Playfair Display',serif;font-size:0.9rem;color:var(--text);margin-bottom:3px}
.side-card .sc-meta{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted)}
.side-card .sc-desc{
  font-size:0.78rem;color:#a09888;margin-top:4px;line-height:1.4;
  display:-webkit-box;
  -webkit-line-clamp:2;
  line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.side-card .sc-media{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted);margin-top:4px}
.side-color-bar{height:2px;border-radius:1px;margin-bottom:6px}

/* toggle sidebar btn */
#toggle-list{
  position:absolute;top:12px;right:12px;
  z-index:450;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:7px 12px;
  font-family:'DM Mono',monospace;font-size:0.67rem;
  color:var(--muted);cursor:pointer;
  transition:all 0.18s;
}
#toggle-list:hover{border-color:var(--gold);color:var(--gold)}

/* ── MODAL ── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.75);z-index:900;
  backdrop-filter:blur(4px);
}
#poi-modal{
  display:none;position:fixed;
  top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  box-shadow:0 12px 50px rgba(0,0,0,0.6);
  z-index:1000;
  width:min(820px,96vw);
  max-height:88vh;
  flex-direction:column;overflow:hidden;
}
#modal-header{
  background:var(--surface2);
  padding:16px 20px;
  border-bottom:2px solid var(--gold);
  display:flex;justify-content:space-between;align-items:flex-start;
}
#modal-name{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--gold)}
#modal-header .close-btn{
  background:none;border:none;color:var(--muted);
  font-size:1.3rem;cursor:pointer;padding:0 4px;transition:color 0.15s;
}
#modal-header .close-btn:hover{color:var(--text)}
#modal-body{padding:18px 22px;overflow-y:auto}
.modal-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;font-size:0.65rem;
  background:var(--surface2);color:var(--muted);
  padding:3px 10px;border-radius:10px;margin-bottom:10px;
}
.modal-badge span{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.modal-meta{
  display:flex;gap:14px;margin-bottom:12px;
  font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--muted);flex-wrap:wrap;
}
#modal-desc{
  font-size:0.88rem;line-height:1.7;color:#c0b8a8;
  margin-bottom:16px;
  background:var(--surface2);padding:12px 14px;
  border-radius:var(--radius);border:1px solid var(--border);
}
#modal-media{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
#modal-media img{
  width:100%;border-radius:5px;object-fit:cover;aspect-ratio:4/3;
  cursor:zoom-in;transition:opacity 0.15s;border:1px solid var(--border);
}
#modal-media img:hover{opacity:0.8}
#modal-media video{width:100%;border-radius:5px;border:1px solid var(--border)}
.vlc-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;margin-top:4px;
  background:none;border:1px solid #f96900;
  border-radius:var(--radius);color:#f96900;
  font-family:'DM Mono',monospace;font-size:0.7rem;
  text-decoration:none;transition:all 0.18s;
  cursor:pointer;
}
.vlc-btn:hover{background:#f96900;color:white}

/* ── LIGHTBOX ── */
#lightbox{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.95);
  z-index:2000;
  align-items:center;
  justify-content:center;
  cursor:zoom-out;
  backdrop-filter:blur(8px);
}
#lightbox.open{display:flex}
#lightbox img{
  max-width:95vw;
  max-height:95vh;
  object-fit:contain;
  border-radius:4px;
  box-shadow:0 8px 60px rgba(0,0,0,0.8);
  cursor:default;
  user-select:none;
}
#lightbox-close{
  position:absolute;top:18px;right:22px;
  background:none;border:none;
  color:rgba(255,255,255,0.6);
  font-size:2rem;cursor:pointer;
  line-height:1;padding:4px 8px;
  border-radius:4px;
  transition:color 0.15s;
  z-index:2001;
}
#lightbox-close:hover{color:#fff}
#lightbox-caption{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:'DM Mono',monospace;font-size:0.7rem;
  color:rgba(255,255,255,0.5);
  background:rgba(0,0,0,0.5);
  padding:4px 14px;border-radius:20px;
  white-space:nowrap;max-width:80vw;
  overflow:hidden;text-overflow:ellipsis;
  pointer-events:none;
}
#lightbox-prev,#lightbox-next{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:50%;
  width:44px;height:44px;
  color:rgba(255,255,255,0.7);
  font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;z-index:2001;
}
#lightbox-prev{left:18px}
#lightbox-next{right:18px}
#lightbox-prev:hover,#lightbox-next:hover{background:rgba(255,255,255,0.18);color:#fff}

/* ── MAP POPUP ── */
.leaflet-popup-content-wrapper{
  background:var(--surface) !important;
  border:1px solid var(--border) !important;
  border-radius:8px !important;
  box-shadow:0 4px 20px rgba(0,0,0,0.5) !important;
}
.leaflet-popup-content{color:var(--text) !important;font-family:'DM Sans',sans-serif !important}
.leaflet-popup-tip{background:var(--surface) !important}
.popup-name{font-family:'Playfair Display',serif;font-size:0.95rem;color:var(--gold);margin-bottom:3px}
.popup-date{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:6px}
.popup-btn{
  display:inline-block;margin-top:4px;padding:4px 10px;
  background:var(--gold);color:#111;border:none;
  border-radius:3px;font-family:'DM Mono',monospace;
  font-size:0.65rem;cursor:pointer;
}

/* cluster count badge */
.cluster-icon{
  background:var(--gold);color:#111;
  border-radius:50%;display:flex;
  align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:0.7rem;
  font-weight:500;border:2px solid #111;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── VIDEO LIBRARY PANEL ── */
#video-lib-panel{
  position:absolute;top:0;left:0;bottom:80px;width:290px;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:401;
  transform:translateX(-100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
#video-lib-panel.open{transform:translateX(0);pointer-events:all;}
#vlib-header{
  padding:12px 14px 10px;border-bottom:1px solid var(--border);
  background:var(--surface2);display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
}
#vlib-title{font-family:'Playfair Display',serif;font-size:0.95rem;color:var(--gold);flex:1;}
#vlib-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:2px 5px;border-radius:3px;transition:color 0.15s;}
#vlib-close:hover{color:var(--text)}
#vlib-list{flex:1;overflow-y:auto;padding:6px 8px;}
#vlib-list::-webkit-scrollbar{width:3px;}
#vlib-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.vlib-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:var(--radius);
  cursor:pointer;transition:all 0.15s;
  border:1px solid transparent;margin-bottom:3px;
}
.vlib-item:hover{background:var(--surface2);border-color:var(--border);}
.vlib-item.active{background:rgba(212,168,83,0.08);border-color:rgba(212,168,83,0.25);}
.vlib-play-icon{
  width:28px;height:28px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;flex-shrink:0;color:var(--muted);transition:all 0.15s;
}
.vlib-item:hover .vlib-play-icon{border-color:var(--gold);color:var(--gold);}
.vlib-item.active .vlib-play-icon{background:var(--gold);color:#111;border-color:var(--gold);}
.vlib-info{flex:1;min-width:0;}
.vlib-name{font-size:0.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.vlib-item.active .vlib-name{color:var(--gold);}
.vlib-tags{display:flex;gap:4px;margin-top:3px;}
.vtag{font-family:'DM Mono',monospace;font-size:0.55rem;padding:1px 5px;border-radius:2px;border:1px solid;text-transform:uppercase;}
.vtag-n{border-color:rgba(71,180,255,0.35);color:#47b4ff;}
.vtag-v{border-color:rgba(249,105,0,0.35);color:#f96900;}
.vtag-s{border-color:var(--border);color:var(--muted);}
/* VIDEO MODAL */
#vlib-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1500;backdrop-filter:blur(6px);}
#vlib-modal{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  box-shadow:0 12px 60px rgba(0,0,0,0.7);z-index:1600;
  width:min(680px,94vw);flex-direction:column;overflow:hidden;
}
#vlib-modal-header{
  background:var(--surface2);padding:14px 18px;
  border-bottom:2px solid var(--gold);
  display:flex;justify-content:space-between;align-items:center;
}
#vlib-modal-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
#vlib-modal-close{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:0 4px;transition:color 0.15s;margin-left:12px;}
#vlib-modal-close:hover{color:var(--text)}
#vlib-modal-video{width:100%;display:block;max-height:52vh;background:#000;outline:none;}
#vlib-modal-bar{
  background:var(--surface2);padding:8px 14px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
#vlib-status{font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--muted);flex:1;min-width:0;}
.vlib-act-btn{
  padding:6px 13px;background:none;border:1px solid var(--border);
  border-radius:var(--radius);color:var(--muted);
  font-family:'DM Mono',monospace;font-size:0.63rem;cursor:pointer;transition:all 0.18s;
}
.vlib-act-btn:hover{border-color:var(--gold);color:var(--gold);}
.vlib-act-btn.orange{border-color:rgba(249,105,0,0.4);color:#f96900;}
.vlib-act-btn.orange:hover{background:#f96900;color:#fff;}

/* ── CUSTOM VIDEO PLAYER ── */
.vp-wrap {
  position:relative;background:#000;
}
.vp-wrap video {
  width:100%;display:block;max-height:420px;outline:none;
}
/* Keep video area stable during seek/rebuffer - prevents modal shrink */
/* height locked by JS during seek to prevent blink */
.vp-controls {
  background:linear-gradient(transparent,rgba(0,0,0,0.85));
  padding:6px 10px 8px;
  display:flex;flex-direction:column;gap:5px;
  opacity:1;
  transition:opacity 0.3s;
}
/* Fullscreen: controls overlaid at bottom via absolute positioning */
/* Fullscreen: vp-wrap is teleported to body so no parent clips it */
.vp-fullscreen {
  position:fixed !important;
  inset:0 !important;
  width:100vw !important;
  height:100vh !important;
  z-index:99999 !important;
  background:#000 !important;
  display:flex !important;
  flex-direction:column !important;
  border-radius:0 !important;
}
.vp-fullscreen video {
  flex:1 !important;
  width:100% !important;
  height:0 !important;
  max-height:none !important;
  min-height:0 !important;
  object-fit:contain !important;
}
.vp-fullscreen .vp-controls {
  flex-shrink:0 !important;
  width:100% !important;
  background:rgba(0,0,0,0.9) !important;
  transition:opacity 0.4s;
}
.vp-fs-idle .vp-controls {
  opacity:0 !important;
  pointer-events:none !important;
}
.vp-fullscreen {
  cursor:default;
}
.vp-fs-idle {
  cursor:none !important;
}
.vp-progress-row {
  display:flex;align-items:center;gap:7px;
}
.vp-time {
  font-family:'DM Mono',monospace;font-size:0.6rem;
  color:rgba(255,255,255,0.6);white-space:nowrap;flex-shrink:0;min-width:80px;text-align:right;
}
.vp-scrubber {
  flex:1;-webkit-appearance:none;appearance:none;
  height:3px;border-radius:2px;outline:none;cursor:pointer;
  background:rgba(255,255,255,0.15);
  background-image:linear-gradient(var(--gold),var(--gold));

}
.vp-scrubber:hover { height:5px; }
.vp-scrubber::-webkit-slider-thumb {
  -webkit-appearance:none;width:12px;height:12px;

}
.vp-scrubber::-moz-range-thumb {

.vp-btn-row {

.vp-btn {
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.75);font-size:14px;
  padding:3px 5px;border-radius:3px;line-height:1;
  transition:color 0.15s,background 0.15s;flex-shrink:0;
}
.vp-btn:hover { color:#fff;background:rgba(255,255,255,0.1); }
.vp-btn.active { color:var(--gold); }
.vp-status {
  flex:1;font-family:'DM Mono',monospace;font-size:0.58rem;
  color:rgba(255,255,255,0.4);padding:0 4px;

}
.vp-vol {
  -webkit-appearance:none;appearance:none;
  width:60px;height:3px;border-radius:2px;
  background:rgba(255,255,255,0.15);

  background-size:100% 100%;background-repeat:no-repeat;
  cursor:pointer;outline:none;
}
.vp-vol::-webkit-slider-thumb {

}
.vp-vol::-moz-range-thumb {
  width:10px;height:10px;border:none;
  border-radius:50%;background:#fff;cursor:pointer;
}

</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>Travel Archive <span id="topbar-sub"></span></h1>
  <div id="folder-pills"></div>
  <button id="lang-btn">SK / EN</button>
  <button id="video-lib-btn" style="margin-left:4px;padding:5px 12px;background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--muted);font-family:'DM Mono',monospace;font-size:0.67rem;cursor:pointer;transition:all 0.18s;white-space:nowrap;" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="if(!document.getElementById('video-lib-panel').classList.contains('open')){this.style.borderColor='var(--border)';this.style.color='var(--muted)'}" onclick="toggleVideoLib()">▶ Videos</button>
  <a href="/admin" id="admin-link">⚙ Admin</a>
</div>

<!-- MAP -->
<div id="map-wrap">
  <div id="map"></div>

  <!-- YEAR SIDEBAR (chronological) -->
  <div id="year-sidebar">
    <div id="year-sidebar-header">
      <span id="year-sidebar-title">—</span>
      <span id="year-sidebar-count"></span>
      <button id="year-sidebar-close" style="background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;padding:2px 5px;border-radius:3px;transition:color 0.15s;margin-left:6px;" title="Close">×</button>
    </div>
    <div id="year-sidebar-list"></div>
  </div>

  <!-- VIDEO LIBRARY PANEL -->
  <div id="video-lib-panel">
    <div id="vlib-header">
      <span id="vlib-title">Video Library</span>
      <span id="vlib-count" style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--muted);margin-right:8px;"></span>
      <button id="vlib-close" onclick="toggleVideoLib()">×</button>
    </div>
    <div id="vlib-list"><div style="padding:20px;color:var(--muted);font-size:0.8rem;text-align:center;">Loading...</div></div>
  </div>

  <!-- toggle sidebar -->
  <button id="toggle-list" data-i18n="show_list">Show List</button>

  <!-- SIDEBAR -->
  <div id="side-panel">
    <div id="side-panel-header">

      <button id="side-close">×</button>
    </div>
    <div id="side-list"></div>
  </div>

  <!-- TIMELINE -->
  <div id="timeline">
    <div id="timeline-inner">
      <div id="tl-label">
        <div id="tl-year">—</div>
        <div id="tl-count"></div>
      </div>
      <div id="tl-ticks"></div>

    </div>

</div>

<!-- MODAL -->
<div id="modal-overlay"></div>
<div id="poi-modal">
  <div id="modal-header">
    <h2 id="modal-name"></h2>
    <button class="close-btn">×</button>
  </div>
  <div id="modal-body">
    <div class="modal-badge"><span id="modal-folder-dot"></span><span id="modal-folder-text"></span></div>
    <div class="modal-meta">
      <span id="modal-date"></span>
      <span id="modal-coords"></span>
    </div>
    <div id="modal-desc"></div>
    <div id="modal-media"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close">×</button>
  <button id="lightbox-prev">&#8592;</button>
  <img id="lightbox-img" src="" alt="">
  <button id="lightbox-next">&#8594;</button>
  <div id="lightbox-caption"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function(){
'use strict';

// ── Lightbox ──────────────────────────────────────
var lbImages = []; // [{src, caption}]
var lbIdx = 0;

function openLightbox(images, startIdx) {
  lbImages = images;
  lbIdx = startIdx || 0;
  showLbImage();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  lbImages = [];
}

function showLbImage() {
  var item = lbImages[lbIdx];
  if (!item) return;
  document.getElementById('lightbox-img').src = item.src;
  document.getElementById('lightbox-caption').textContent = item.caption || '';
  document.getElementById('lightbox-prev').style.display = lbImages.length > 1 ? 'flex' : 'none';
  document.getElementById('lightbox-next').style.display = lbImages.length > 1 ? 'flex' : 'none';
}

document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox-prev').addEventListener('click', function(e) {
  e.stopPropagation();
  lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length;
  showLbImage();
});
document.getElementById('lightbox-next').addEventListener('click', function(e) {
  e.stopPropagation();
  lbIdx = (lbIdx + 1) % lbImages.length;
  showLbImage();
});
document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length; showLbImage(); }
  if (e.key === 'ArrowRight') { lbIdx = (lbIdx + 1) % lbImages.length; showLbImage(); }
});

// ── i18n ──────────────────────────────────────────
var lang = localStorage.getItem('lang') || 'en';
var T = {
  en: {
    show_list:'Show List', hide_list:'Hide List',
    locations:'Locations', all:'All',
    date:'Date', coords:'Coords',
    open_vlc:'Open in VLC', no_browser:'Cannot play in browser — open in VLC',
    pois:function(n){return n+' location'+(n!==1?'s':'')},
    all_years:'All years',
    uncategorized:'Uncategorized',
  },
  sk: {
    show_list:'Zobraziť zoznam', hide_list:'Skryť zoznam',
    locations:'Miesta', all:'Všetky',
    date:'Dátum', coords:'Súradnice',
    open_vlc:'Otvoriť vo VLC', no_browser:'Nedá sa prehrať — otvorte vo VLC',
    pois:function(n){ return n + (n===1?' miesto':n>=2&&n<=4?' miesta':' miest'); },
    all_years:'Všetky roky',
    uncategorized:'Bez kategórie',
  },
};

function t(key){ return (T[lang]||T.en)[key] || key; }

function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    el.textContent = t(el.dataset.i18n);
  });
}

document.getElementById('lang-btn').addEventListener('click', function(){
  lang = lang === 'en' ? 'sk' : 'en';
  localStorage.setItem('lang', lang);
  applyLang();
  renderFolderPills();
  renderSideList();
  updateTimeline();
  // re-render year sidebar with updated language
  var pois = allPois;
  if(activeFolderId==='uncat') pois=pois.filter(function(p){return !p.folder_id;});
  else if(activeFolderId!==null) pois=pois.filter(function(p){return p.folder_id===activeFolderId;});
  var yearPois = activeYear ? pois.filter(function(p){return p.date&&p.date.slice(0,4)===String(activeYear);}) : pois;
  renderYearSidebar(yearPois, pois);
});

// ── State ─────────────────────────────────────────
var allFolders = [], allPois = [], allRoutes = [];
var activeFolderId = null;   // null = all
var activeYear     = null;   // set to first available year on load
var years          = [];
var markerMap      = {};
var routeLayerMap  = {};
var isLocalAccess  = false;  // set by /api/is-local

// ── Map ───────────────────────────────────────────
var map = L.map('map', {zoomControl:false}).setView([48.7, 19.5], 7);
L.control.zoom({position:'bottomleft'}).addTo(map);

// Map layers — hiking focus
var layers = {
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenTopoMap © OSM',maxZoom:17,
  }),
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:19,
  }),
  cycle: L.tileLayer('https://{s}.tile-cyclosm.openstreetmap.fr/cyclosm/{z}/{x}/{y}.png',{
    attribution:'© CyclOSM © OSM',maxZoom:20,
  }),
};

layers.topo.addTo(map);

L.control.layers({
  '🏔 Topo / Hiking': layers.topo,
  '🗺 Standard OSM':  layers.osm,
  '🚵 CyclOSM':       layers.cycle,
},{},{position:'bottomleft'}).addTo(map);

// ── Icons ─────────────────────────────────────────
function makeIcon(color, small){
  var s = small ? 18 : 22, sy = small ? 24 : 30;
  return L.divIcon({
    className:'',
    html:'<svg width="'+s+'" height="'+sy+'" viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">'
      +'<path d="M12 0C5.37 0 0 5.37 0 12c0 9 12 20 12 20S24 21 24 12C24 5.37 18.63 0 12 0z" fill="'+color+'" stroke="rgba(0,0,0,0.35)" stroke-width="1.5"/>'
      +'<circle cx="12" cy="12" r="4.5" fill="rgba(255,255,255,0.85)"/>'
      +'</svg>',
    iconSize:[s,sy],iconAnchor:[s/2,sy],popupAnchor:[0,-sy]
  });
}

// ── Load ──────────────────────────────────────────
async function load(){
  try{
    // Check if we're accessing from localhost (enables server-side VLC launch)
    try{
      var lr = await fetch('/api/is-local');
      var ld = await lr.json();
      isLocalAccess = ld.local === true;
    }catch(e){ isLocalAccess = false; }

    var res = await fetch('/api/all');
    var d = await res.json();
    allFolders = d.folders||[]; allPois = d.pois||[]; allRoutes = d.routes||[];
    buildYears();
    renderFolderPills();
    renderAll();
    document.getElementById('topbar-sub').textContent =
      '— ' + allPois.length + ' ' + (lang==='sk'?'miest':'locations');
  }catch(e){
    console.error('Load failed',e);
  }
}

function buildYears(){
  var ySet = {};
  allPois.forEach(function(p){
    var y = p.date ? p.date.slice(0,4) : null;
    if(y) ySet[y] = true;
  });
  years = Object.keys(ySet).sort();
}

// ── Folder pills ──────────────────────────────────
function renderFolderPills(){
  var el = document.getElementById('folder-pills');
  var html = '<button class="pill'+(activeFolderId===null?' active':'')+'" data-id="ALL">'
    +'<span class="pill-dot" style="background:var(--gold)"></span>'
    + t('all')
    +'</button>';
  allFolders.forEach(function(f){
    html += '<button class="pill'+(activeFolderId===f.id?' active':'')+'" data-id="'+f.id+'">'
      +'<span class="pill-dot" style="background:'+f.color+'"></span>'
      + f.name
      +'</button>';
  });
  // uncategorized pill if needed
  var hasUncat = allPois.some(function(p){return !p.folder_id;});
  if(hasUncat){
    html += '<button class="pill'+(activeFolderId==='uncat'?' active':'')+'" data-id="UNCAT">'
      +'<span class="pill-dot" style="background:#6a6580"></span>'
      + t('uncategorized')
      +'</button>';
  }
  el.innerHTML = html;
  el.querySelectorAll('.pill').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = btn.dataset.id;
      activeFolderId = id==='ALL'?null : id==='UNCAT'?'uncat' : Number(id);
      renderFolderPills();
      renderAll();
    });
  });
}

// ── Filter ────────────────────────────────────────
function visiblePois(){
  var list = allPois;
  if(activeFolderId === 'uncat') list = list.filter(function(p){return !p.folder_id;});
  else if(activeFolderId !== null) list = list.filter(function(p){return p.folder_id===activeFolderId;});
  if(activeYear !== null) list = list.filter(function(p){return p.date && p.date.slice(0,4)===String(activeYear);});
  return list;
}

function visibleRoutes(){
  var list = allRoutes;
  if(activeFolderId==='uncat') list=list.filter(function(r){return !r.folder_id;});
  else if(activeFolderId!==null) list=list.filter(function(r){return r.folder_id===activeFolderId;});
  return list;
}

// ── Render All ────────────────────────────────────
function renderAll(){
  Object.values(markerMap).forEach(function(m){map.removeLayer(m);});
  Object.values(routeLayerMap).forEach(function(l){map.removeLayer(l);});
  markerMap={}; routeLayerMap={};

  var pois = visiblePois();
  pois.forEach(function(poi){
    var color = folderColor(poi.folder_id);
    var marker = L.marker([poi.lat,poi.lng],{icon:makeIcon(color)}).addTo(map);
    marker.bindPopup(popupHtml(poi), {maxWidth:220, className:'dark-popup'});
    marker.on('click', function(){ openModal(poi); });
    markerMap[poi.id] = marker;
  });

  visibleRoutes().forEach(function(r){
    if(!r.points||r.points.length<2) return;
    var line = L.polyline(r.points.map(function(p){return[p.lat,p.lng];}),{
      color:r.color||'#2980b9',weight:3,opacity:0.75
    }).addTo(map);
    routeLayerMap[r.id] = line;
  });

  renderSideList();
  updateTimeline();

  // Fit map to visible POIs
  if(pois.length > 0){
    var bounds = L.latLngBounds(pois.map(function(p){return[p.lat,p.lng];}));
    map.flyToBounds(bounds,{padding:[60,60],maxZoom:14,duration:1});
  }
}

function popupHtml(poi){
  return '<div class="popup-name">'+esc(poi.name)+'</div>'
    +'<div class="popup-date">'+esc(poi.date)+'</div>';
}

// ── Side list ─────────────────────────────────────
function renderSideList(){
  var el = document.getElementById('side-list');
  var pois = visiblePois().slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  if(!pois.length){
    el.innerHTML='<p style="color:var(--muted);font-size:0.8rem;padding:20px;text-align:center">'+
      (lang==='sk'?'Žiadne miesta':'No locations')+'</p>'; return;
  }
  el.innerHTML = pois.map(function(p){
    var color = folderColor(p.folder_id);
    var mediaCount = (p.media||[]).length;
    return '<div class="side-card" data-id="'+p.id+'">'
      +'<div class="side-color-bar" style="background:'+color+'"></div>'
      +'<h3>'+esc(p.name)+'</h3>'
      +'<div class="sc-meta">'+esc(p.date)+'  ·  '+p.lat.toFixed(3)+', '+p.lng.toFixed(3)+'</div>'
      +'<div class="sc-desc">'+esc(p.description)+'</div>'
      +(mediaCount?'<div class="sc-media">📎 '+mediaCount+' file'+(mediaCount!==1?'s':'')+'</div>':'')
      +'</div>';
  }).join('');
  el.querySelectorAll('.side-card').forEach(function(card){
    card.addEventListener('click', function(){
      var poi = allPois.find(function(p){return p.id===Number(card.dataset.id);});
      if(!poi) return;
      map.flyTo([poi.lat,poi.lng],13,{duration:1});
      openModal(poi);
    });
  });
}

// ── Timeline ──────────────────────────────────────
function updateTimeline(){
  var pois = allPois;
  if(activeFolderId==='uncat') pois=pois.filter(function(p){return !p.folder_id;});
  else if(activeFolderId!==null) pois=pois.filter(function(p){return p.folder_id===activeFolderId;});

  var ySet={};
  pois.forEach(function(p){ var y=p.date?p.date.slice(0,4):null; if(y) ySet[y]=true; });
  var currentYears = Object.keys(ySet).sort();

  var slider = document.getElementById('tl-slider');
  var yearEl = document.getElementById('tl-year');
  var countEl = document.getElementById('tl-count');

  if(!currentYears.length){
    slider.min=0; slider.max=0; slider.value=0;
    yearEl.textContent='—'; countEl.textContent=''; buildTicks([]); return;
  }

  // Add "all" as index 0, then years
  var allYears = [null].concat(currentYears); // null = all
  slider.min=0; slider.max=allYears.length-1;

  // Find current slider position
  var curIdx = activeYear===null ? 0 : allYears.indexOf(String(activeYear));
  if(curIdx<0) curIdx=0;
  slider.value = curIdx;

  function updateDisplay(){
    var idx = parseInt(slider.value);
    var y = allYears[idx];
    activeYear = y ? Number(y) : null;
    yearEl.textContent = y || t('all_years');
    var filtered = y ? pois.filter(function(p){return p.date&&p.date.slice(0,4)===y;}) : pois;
    countEl.textContent = t('pois')(filtered.length);
    renderMarkersOnly();
    renderSideList();
    buildTicks(currentYears, allYears, parseInt(slider.value));
    renderYearSidebar(filtered, pois);
  }

  slider.oninput = updateDisplay;
  buildTicks(currentYears, allYears, curIdx);
  updateDisplay();
}

function buildTicks(currentYears, allYears, activeIdx){
  var el = document.getElementById('tl-ticks');
  if(!currentYears||!currentYears.length){el.innerHTML='';return;}
  allYears = allYears||[null].concat(currentYears);
  var html='';
  allYears.forEach(function(y, idx){
    var pct = allYears.length>1 ? (idx/(allYears.length-1)*100) : 50;
    var hasData = y && currentYears.indexOf(y)>=0;
    var isActive = idx===(activeIdx||0);
    html+='<div class="tl-tick'+(hasData?' has-data':'')+(isActive?' active':'')+'" '
      +'style="left:'+pct+'%" data-idx="'+idx+'">'
      +'<div class="tl-tick-mark"></div>'
      +(y||'All')
      +'</div>';
  });
  el.innerHTML=html;
  el.querySelectorAll('.tl-tick').forEach(function(tick){
    tick.addEventListener('click', function(){
      var slider = document.getElementById('tl-slider');
      slider.value = tick.dataset.idx;
      slider.dispatchEvent(new Event('input'));
    });
  });
}

// ── Year Sidebar (chronological) ──────────────────
var MONTH_NAMES = {
  en:['January','February','March','April','May','June','July','August','September','October','November','December'],
  sk:['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December']
};

function renderYearSidebar(pois, allFolderPois){
  var sidebar  = document.getElementById('year-sidebar');
  var titleEl  = document.getElementById('year-sidebar-title');
  var countEl2 = document.getElementById('year-sidebar-count');
  var listEl   = document.getElementById('year-sidebar-list');

  if(!pois||!pois.length){
    sidebar.classList.remove('open');
    return;
  }

  titleEl.textContent  = activeYear ? String(activeYear) : t('all_years');
  countEl2.textContent = t('pois')(pois.length);

  // Sort chronologically ascending
  var sorted = pois.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });

  // Group by month key YYYY-MM
  var months = {}, monthOrder = [];
  sorted.forEach(function(p){
    var mk = p.date ? p.date.slice(0,7) : '????-??';
    if(!months[mk]){ months[mk]=[]; monthOrder.push(mk); }
    months[mk].push(p);
  });

  var names = MONTH_NAMES[lang] || MONTH_NAMES.en;

  function monthLabel(key){
    var parts = key.split('-');
    var mIdx  = parseInt(parts[1],10)-1;
    return (names[mIdx]||key);
  }

  function dayLabel(dateStr){
    if(!dateStr||dateStr.length<10) return dateStr||'';
    var parts = dateStr.split('-');
    var mIdx  = parseInt(parts[1],10)-1;
    var shortNames = {
      en:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
      sk:['jan','feb','mar','apr','máj','jún','júl','aug','sep','okt','nov','dec']
    };
    var sn = shortNames[lang]||shortNames.en;
    return parseInt(parts[2],10)+' '+sn[mIdx];
  }

  var html='';
  monthOrder.forEach(function(mk){
    html+='<div class="yc-month-group">'
      +'<div class="yc-month-label">'+monthLabel(mk)+'</div>';
    months[mk].forEach(function(p){
      var color = folderColor(p.folder_id);
      var fname = folderName(p.folder_id);
      html+='<div class="yc-entry" data-id="'+p.id+'">'
        +'<div class="yc-dot" style="background:'+color+';margin-top:5px"></div>'
        +'<div class="yc-info">'
          +'<div class="yc-name">'+esc(p.name)+'</div>'
          +'<div class="yc-date">'+dayLabel(p.date)+'</div>'
          +(fname&&fname!==t('uncategorized')?'<div class="yc-folder">'+esc(fname)+'</div>':'')
        +'</div>'
        +'</div>';
    });
    html+='</div>';
  });

  listEl.innerHTML=html;
  listEl.querySelectorAll('.yc-entry').forEach(function(card){
    card.addEventListener('click', function(){
      var poi=allPois.find(function(p){return p.id===Number(card.dataset.id);});
      if(!poi) return;
      listEl.querySelectorAll('.yc-entry').forEach(function(c){c.classList.remove('active');});
      card.classList.add('active');
      map.flyTo([poi.lat,poi.lng],13,{duration:0.8});
      openModal(poi);
    });
  });

  sidebar.classList.add('open');
}

function renderMarkersOnly(){
  Object.values(markerMap).forEach(function(m){map.removeLayer(m);});
  markerMap={};
  visiblePois().forEach(function(poi){
    var color = folderColor(poi.folder_id);
    var marker = L.marker([poi.lat,poi.lng],{icon:makeIcon(color)}).addTo(map);
    marker.on('click', function(){ openModal(poi); });
    markerMap[poi.id] = marker;
  });
}

// ── Modal ─────────────────────────────────────────
var _modalPlayers = [];  // track active players so closeModal can destroy them

function openModal(poi){
  // Destroy any players from a previous modal open
  _modalPlayers.forEach(function(p){ try{ p.destroy(); }catch(e){} });
  _modalPlayers = [];
  document.getElementById('modal-name').textContent = poi.name;
  document.getElementById('modal-date').textContent = t('date')+': '+poi.date;
  document.getElementById('modal-coords').textContent = poi.lat.toFixed(5)+', '+poi.lng.toFixed(5);
  document.getElementById('modal-desc').textContent = poi.description;

  var color = folderColor(poi.folder_id);
  document.getElementById('modal-folder-dot').style.background = color;
  document.getElementById('modal-folder-text').textContent = folderName(poi.folder_id);

  var mediaDiv = document.getElementById('modal-media');
  mediaDiv.innerHTML='';

  var PLAYABLE_EXT = ['.mp4','.webm','.ogg','.ogv','.m4v'];
  // Extended list — browsers can often play these if codec is available
  var STREAMABLE_EXT = ['.mkv','.avi','.mov','.wmv','.mpg','.mpeg','.vob','.flv','.ts','.m2ts','.m4v'];
  function playable(item){
    var ext=(item.name||'').toLowerCase().match(/\.[^.]+$/);
    return ext && PLAYABLE_EXT.includes(ext[0]);
  }
  function streamable(item){
    var ext=(item.name||'').toLowerCase().match(/\.[^.]+$/);
    return ext && (PLAYABLE_EXT.includes(ext[0]) || STREAMABLE_EXT.includes(ext[0]));
  }

  // Collect all images for lightbox navigation
  var allImages = (poi.media||[]).filter(function(item){
    return (item.type||'').toLowerCase().startsWith('image/');
  });

  (poi.media||[]).forEach(function(item){
    var type = (item.type||'').toLowerCase();
    var isImage = type.startsWith('image/');
    var ext = (item.name||'').toLowerCase().match(/\.[^.]+$/);
    ext = ext ? ext[0] : '';

    if(isImage){
      var imgIdx = allImages.indexOf(item);
      var img = document.createElement('img');
      img.src = item.url;
      img.alt = item.name;
      img.loading = 'lazy';
      img.title = 'Click to view full size';
      img.onclick = function(){
        openLightbox(allImages.map(function(m){ return {src: m.url, caption: m.name}; }), imgIdx);
      };
      mediaDiv.appendChild(img);
      return;
    }

    // ── Video wrapper ──
    var wrap = document.createElement('div');
    wrap.style.cssText='margin-bottom:8px;border:1px solid var(--border);border-radius:6px;overflow:hidden;background:#0a0a12;grid-column:1/-1';

    var bar = document.createElement('div');
    bar.style.cssText='padding:5px 10px;font-family:"DM Mono",monospace;font-size:0.69rem;color:var(--muted);display:flex;align-items:center;gap:7px;background:var(--surface2)';
    bar.innerHTML='🎬 <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(item.name)+'</span>'
      +(item.local_path?'<span style="color:var(--green);font-size:9px">LINKED</span>':'')
      +(item.transcoded_from?'<span style="color:#7eb8f7;font-size:9px">MP4</span>':'')
      +'<span style="color:#555;font-size:9px">'+ext.replace('.','').toUpperCase()+'</span>';
    wrap.appendChild(bar);

    if(!item.url){
      var miss = document.createElement('div');
      miss.style.cssText='padding:10px 12px;color:var(--muted);font-size:0.75rem';
      miss.textContent='File URL missing';
      wrap.appendChild(miss);
      mediaDiv.appendChild(wrap);
      return;
    }

    // Build the stream key: absolute path for linked files, bare filename for uploaded ones
    var streamKey = item.local_path || item.filename || item.url.replace('/media/','');
    // base64url-encode safely — btoa() breaks on non-ASCII paths (accented chars, etc.)
    var b64key = btoa(unescape(encodeURIComponent(streamKey))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
    var streamSrc = '/stream/' + b64key;
    var nativeExts = ['.mp4','.webm','.ogg','.ogv','.m4v'];
    var isNative = nativeExts.some(function(e){ return ext === e; });
    // For linked files, item.url is a /stream/… URL that doesn't support HTTP Range.
    // Use streamSrc (which resolves to the absolute path on server) for both native and stream modes.
    var directSrc = item.local_path ? streamSrc : item.url;

    // ── Custom player ──────────────────────────────────────────────────
    var player = makeVideoPlayer({
      streamSrc: streamSrc,
      directSrc: directSrc,
      isNative:  isNative,
      b64key:    b64key,
      maxHeight: '420px',
    });
    var vid     = player.vid;
    var statusEl = player.statusEl;
    _modalPlayers.push(player);  // track for cleanup
    wrap.appendChild(player.el);

    // Action buttons
    var btns = document.createElement('div');
    btns.style.cssText = 'display:flex;gap:8px;padding:4px 10px 10px;flex-wrap:wrap;align-items:center';

    // Format badge
    var badge = document.createElement('span');
    badge.style.cssText = 'font-family:"DM Mono",monospace;font-size:0.62rem;padding:3px 8px;border:1px solid;border-radius:4px;';
    if (isNative) {
      badge.style.cssText += 'border-color:rgba(71,180,255,0.35);color:#47b4ff;';
      badge.textContent = '⚡ Native';
      badge.title = 'Direct HTTP range streaming — seekable';
    } else {
      badge.style.cssText += 'border-color:rgba(249,105,0,0.35);color:#f96900;';
      badge.textContent = '📡 Server stream';
      badge.title = 'Transcoded to fMP4 on the server via ffmpeg (or VLC fallback)';
    }
    btns.appendChild(badge);

    // ── Copy stream URL ──
    var networkUrl = window.location.origin + streamSrc;
    var copyBtn = document.createElement('button');
    copyBtn.className = 'vlc-btn';
    copyBtn.style.fontSize = '0.65rem';
    copyBtn.title = 'Copy stream URL — open in VLC: Media → Open Network Stream';
    copyBtn.textContent = '📋 Copy URL';
    copyBtn.onclick = function(){
      navigator.clipboard.writeText(networkUrl).then(function(){
        copyBtn.textContent = '✓ Copied!';
        setTimeout(function(){ copyBtn.textContent = '📋 Copy URL'; }, 2000);
      }).catch(function(){
        window.prompt('Stream URL (open in VLC via Media → Open Network Stream):', networkUrl);
      });
    };
    btns.appendChild(copyBtn);

    // ── Server-side VLC launch (localhost only) ──
    if(isLocalAccess){
      var vlcA = document.createElement('button');
      vlcA.className = 'vlc-btn';
      vlcA.style.borderColor = '#f96900';
      vlcA.style.color = '#f96900';
      vlcA.textContent = '▶ ' + t('open_vlc') + ' (server)';
      vlcA.title = 'Launch VLC on the server machine (only works from localhost)';
      vlcA.onclick = async function(){
        vlcA.disabled = true; vlcA.textContent = '▶ Launching…';
        try{
          var res = await fetch('/api/play',{method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({local_path:item.local_path||'',filename:item.filename||''})});
          var d = await res.json();
          if(!res.ok) throw new Error(d.error||'HTTP '+res.status);
          vlcA.textContent = '▶ VLC opened ✓';
          setTimeout(function(){ vlcA.textContent = '▶ '+t('open_vlc')+' (server)'; vlcA.disabled = false; }, 2500);
        }catch(e){
          vlcA.textContent = '▶ '+t('open_vlc')+' (server)'; vlcA.disabled = false;
          alert('VLC error: ' + e.message);
        }
      };
      btns.appendChild(vlcA);
    }

    // ── Convert to MP4 (ffmpeg) — permanent transcoding option ──
    var cvtBtn = document.createElement('button');
    cvtBtn.style.cssText = 'padding:7px 14px;background:#0078d4;border:none;border-radius:var(--radius);color:#fff;font-family:"DM Mono",monospace;font-size:0.65rem;cursor:pointer';
    cvtBtn.textContent = '⚙ Convert to MP4';
    cvtBtn.title = 'Permanently transcode to MP4 on the server using ffmpeg (seekable, no VLC needed)';
    cvtBtn.onclick = async function(){
      cvtBtn.disabled = true; cvtBtn.textContent = '⏳ Converting…';
      try{
        var res = await fetch('/api/transcode',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({poi_id:poi.id,src_key:item.local_path||item.filename,src_name:item.name})});
        var d = await res.json();
        if(!res.ok) throw new Error(d.error||'HTTP '+res.status);
        vid.src = d.media.url;
        vid.load();
        bar.innerHTML += '<span style="color:#27ae60;font-size:9px">✓ CONVERTED</span>';
        cvtBtn.remove();
      }catch(e){
        cvtBtn.disabled = false; cvtBtn.textContent = '⚙ Convert to MP4';
        alert('Convert failed: ' + e.message);
      }
    };
    btns.appendChild(cvtBtn);

    wrap.appendChild(btns);
    mediaDiv.appendChild(wrap);
  });

  document.getElementById('poi-modal').style.display='flex';
  document.getElementById('modal-overlay').style.display='block';
}

function closeModal(){
  // Kill all active streams/players before hiding
  _modalPlayers.forEach(function(p){ try{ p.destroy(); }catch(e){} });
  _modalPlayers = [];
  document.getElementById('poi-modal').style.display='none';
  document.getElementById('modal-overlay').style.display='none';
  document.getElementById('modal-media').innerHTML = '';
}

document.querySelector('.close-btn').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', closeModal);

// ── Helpers ───────────────────────────────────────
function folderColor(fid){
  if(!fid) return '#6a6580';
  var f=allFolders.find(function(x){return x.id===fid;});
  return f?f.color:'#6a6580';
}
function folderName(fid){
  if(!fid) return t('uncategorized');
  var f=allFolders.find(function(x){return x.id===fid;});
  return f?f.name:t('uncategorized');
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


// ══════════════ CUSTOM VIDEO PLAYER ══════════════
/**
 * makeVideoPlayer({ streamSrc, directSrc, isNative, b64key, maxHeight })
 * Returns { el, vid, statusEl, destroy }
 *
 * For native formats: uses HTML5 range streaming — fully seekable.
 * For transcoded formats: calls /duration/ to get full length, then
 *   restarts /stream/?seek=N when user scrubs to a position.
 */
function makeVideoPlayer(opts) {
  var streamSrc = opts.streamSrc;
  var directSrc = opts.directSrc;
  var isNative  = opts.isNative;
  var b64key    = opts.b64key;
  var maxH      = opts.maxHeight || '420px';

  var totalDur   = 0;    // seconds, from ffprobe
  var currentPos = 0;    // seconds, tracked manually for stream mode
  var posTimer   = null; // interval that advances currentPos
  var seekPending = false;

  // ── DOM ──
  var el = document.createElement('div');
  el.className = 'vp-wrap';

  var vid = document.createElement('video');
  vid.preload = 'metadata';
  vid.style.cssText = 'width:100%;display:block;max-height:' + maxH + ';outline:none;background:#000';
  el.appendChild(vid);

  var controls = document.createElement('div');
  controls.className = 'vp-controls';
  el.appendChild(controls);

  // Progress row
  var progressRow = document.createElement('div');
  progressRow.className = 'vp-progress-row';

  var scrubber = document.createElement('input');
  scrubber.type = 'range';
  scrubber.className = 'vp-scrubber';
  scrubber.min = 0; scrubber.max = 100; scrubber.value = 0; scrubber.step = 0.1;

  var timeEl = document.createElement('div');
  timeEl.className = 'vp-time';
  timeEl.textContent = '0:00 / 0:00';

  progressRow.appendChild(scrubber);
  progressRow.appendChild(timeEl);
  controls.appendChild(progressRow);

  // Button row
  var btnRow = document.createElement('div');
  btnRow.className = 'vp-btn-row';

  function mkBtn(label, title) {
    var b = document.createElement('button');
    b.className = 'vp-btn'; b.title = title;
    b.innerHTML = label; return b;
  }

  var btnPlay = mkBtn('▶', 'Play / Pause (Space)');
  var btnRew  = mkBtn('⏪', 'Back 10s (←)');
  var btnFwd  = mkBtn('⏩', 'Forward 10s (→)');
  var btnMute = mkBtn('🔊', 'Mute (M)');
  var volSlider = document.createElement('input');
  volSlider.type = 'range'; volSlider.className = 'vp-vol';
  volSlider.min = 0; volSlider.max = 1; volSlider.step = 0.05; volSlider.value = 1;
  var statusEl = document.createElement('div');
  statusEl.className = 'vp-status';
  var btnFs = mkBtn('⛶', 'Fullscreen (F)');

  btnRow.appendChild(btnPlay);
  btnRow.appendChild(btnRew);
  btnRow.appendChild(btnFwd);
  btnRow.appendChild(btnMute);
  btnRow.appendChild(volSlider);
  btnRow.appendChild(statusEl);
  btnRow.appendChild(btnFs);
  controls.appendChild(btnRow);

  // ── Helpers ──
  function fmtTime(s) {
    if (!isFinite(s) || s < 0) s = 0;
    var h = Math.floor(s / 3600);
    var m = Math.floor((s % 3600) / 60);
    var sec = Math.floor(s % 60);
    if (h > 0) return h + ':' + pad(m) + ':' + pad(sec);
    return m + ':' + pad(sec);
  }
  function pad(n) { return n < 10 ? '0' + n : String(n); }

  function updateTimeDisplay(pos) {
    var dur = totalDur || (isNative ? vid.duration : 0);
    timeEl.textContent = fmtTime(pos) + ' / ' + fmtTime(dur);
    var pct = (dur > 0) ? (pos / dur * 100) : 0;
    scrubber.value = pct;
    scrubber.style.backgroundSize = pct + '% 100%';
  }

  function setStatus(txt, color) {
    statusEl.textContent = txt;
    statusEl.style.color = color || '';
  }

  // ── Position tracking for stream mode ──
  function startPosTimer() {
    stopPosTimer();
    posTimer = setInterval(function() {
      if (!vid.paused && !vid.ended) {
        currentPos += 0.25;
        if (currentPos > totalDur && totalDur > 0) currentPos = totalDur;
        updateTimeDisplay(currentPos);
      }
    }, 250);
  }
  function stopPosTimer() {
    if (posTimer) { clearInterval(posTimer); posTimer = null; }
  }

  // ── Load & play ──
  function lockHeight() {
    // Freeze wrapper height before src change so it doesn't collapse while buffering
    var h = vid.videoHeight, w = vid.videoWidth;
    if (h > 0 && w > 0) {
      var ratio = h / w;
      var wrapW = el.offsetWidth || 640;
      var px = Math.min(Math.round(wrapW * ratio), parseInt(maxH));
      el.style.minHeight = px + 'px';
      vid.style.minHeight = px + 'px';
    }
  }

  function loadVideo(seekTo) {
    seekTo = seekTo || 0;
    currentPos = seekTo;
    lockHeight(); // freeze size before touching src
    vid.pause();
    stopPosTimer();

    if (isNative) {
      if (!vid.src || vid.src.indexOf(directSrc) === -1) {
        vid.src = directSrc;
      }
      vid.load();
      if (seekTo > 0) {
        vid.addEventListener('loadedmetadata', function onMeta() {
          vid.removeEventListener('loadedmetadata', onMeta);
          vid.currentTime = seekTo;
          vid.play().catch(function(){});
        });
      } else {
        vid.play().catch(function(){});
      }
    } else {
      // Stream mode: restart ffmpeg with seek offset
      var src = streamSrc + (seekTo > 0 ? '?seek=' + seekTo.toFixed(1) : '');
      vid.src = src;
      vid.load();
      setStatus('Seeking...', '#f96900');
      vid.play().catch(function(){});
      // Only start position timer once video actually plays (not during buffering)
      vid.addEventListener('playing', function onFirstPlay() {
        vid.removeEventListener('playing', onFirstPlay);
        if (!destroyed) startPosTimer();
      });
    }
  }

  // Fetch duration from server
  function fetchDuration() {
    fetch('/duration/' + b64key)
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.duration && d.duration > 0) {
          totalDur = d.duration;
          updateTimeDisplay(isNative ? (vid.currentTime||0) : currentPos);
        } else {
          // Server couldn't get duration — show --:-- so user knows timeline needs it
          timeEl.textContent = fmtTime(isNative ? (vid.currentTime||0) : currentPos) + ' / --:--';
        }
      })
      .catch(function(){
        timeEl.textContent = fmtTime(0) + ' / --:--';
      });
  }

  // ── Event wiring ──

  // Play/pause button
  btnPlay.onclick = function() {
    if (vid.paused) { vid.play().catch(function(){}); }
    else            { vid.pause(); }
  };

  vid.addEventListener('play',  function(){ btnPlay.innerHTML = '⏸'; });
  vid.addEventListener('pause', function(){ btnPlay.innerHTML = '▶'; });
  vid.addEventListener('ended', function(){
    btnPlay.innerHTML = '▶';
    stopPosTimer();
    currentPos = totalDur || currentPos;
    updateTimeDisplay(currentPos);
  });

  // Native: sync scrubber from vid.currentTime
  if (isNative) {
    vid.addEventListener('timeupdate', function() {
      updateTimeDisplay(vid.currentTime);
    });
    vid.addEventListener('loadedmetadata', function() {
      totalDur = vid.duration || 0;
      updateTimeDisplay(vid.currentTime);
    });
  }
  // After first load: lock min-height so seeks don't collapse the wrapper
  vid.addEventListener('loadedmetadata', function onFirstMeta() {
    lockHeight();
  });

  // Status events
  vid.addEventListener('playing', function(){
    if (!isNative) {
      setStatus('Streaming (server transcoded)', '#27ae60');
    } else {
      setStatus('');
    }
  });
  vid.addEventListener('waiting', function(){ if (!destroyed) setStatus('Buffering...', '#f96900'); });
  vid.addEventListener('error',   function(){
    if (destroyed) return;
    setStatus('Error — check ffmpeg on server', '#e74c3c');
    stopPosTimer();
  });

  // Scrubber — same seek mechanism as skip buttons (loadVideo / vid.currentTime)
  var scrubActive = false;

  scrubber.addEventListener('mousedown', function(){ scrubActive = true; });
  scrubber.addEventListener('touchstart', function(){ scrubActive = true; }, {passive:true});

  // While dragging: update time label + fill only (no seek yet)
  scrubber.addEventListener('input', function() {
    var dur = totalDur || (isNative ? vid.duration : 0);
    if (!dur) return;
    var targetSec = parseFloat(scrubber.value) / 100 * dur;
    timeEl.textContent = fmtTime(targetSec) + ' / ' + fmtTime(dur);
    scrubber.style.backgroundSize = scrubber.value + '% 100%';
  });

  // On release: compute new_pos from scrubber % * totalDur, then seek exactly like skip buttons
  function onScrubRelease() {
    if (!scrubActive) return;
    scrubActive = false;
    var dur = totalDur || (isNative ? vid.duration : 0);
    if (!dur) return;
    var new_pos = parseFloat(scrubber.value) / 100 * dur;
    new_pos = Math.max(0, Math.min(dur, new_pos));
    if (isNative) {
      vid.currentTime = new_pos;
    } else {
      stopPosTimer();
      loadVideo(new_pos);
    }
  }
  // Listen on document so release is caught even if mouse drifts off the element
  document.addEventListener('mouseup',  onScrubRelease);
  document.addEventListener('touchend', onScrubRelease);

  // ±10s buttons
  btnRew.onclick = function() {
    var dur = totalDur || (isNative ? vid.duration : 0);
    if (isNative) {
      vid.currentTime = Math.max(0, vid.currentTime - 10);
    } else {
      var pos = Math.max(0, currentPos - 10);
      stopPosTimer(); loadVideo(pos);
    }
  };
  btnFwd.onclick = function() {
    var dur = totalDur || (isNative ? vid.duration : 0);
    if (isNative) {
      vid.currentTime = Math.min(dur || 1e9, vid.currentTime + 10);
    } else {
      var pos = Math.min(dur || 1e9, currentPos + 10);
      stopPosTimer(); loadVideo(pos);
    }
  };

  // Mute / volume
  btnMute.onclick = function() {
    vid.muted = !vid.muted;
    btnMute.innerHTML = vid.muted ? '🔇' : '🔊';
  };
  volSlider.addEventListener('input', function() {
    vid.volume = parseFloat(volSlider.value);
    vid.muted = (vid.volume === 0);
    btnMute.innerHTML = vid.muted ? '🔇' : '🔊';
    volSlider.style.backgroundSize = (vid.volume * 100) + '% 100%';
  });

  // Fullscreen: teleport to <body>, then use native FS API
  var fsActive = false;
  var fsPlaceholder = null;
  function onFsChange() {}  // kept for destroy() compatibility

  function exitFs() {
    el.classList.remove('vp-fullscreen');
    el.classList.remove('vp-fs-idle');
    clearTimeout(el._fsIdleTimer);
    if (fsPlaceholder) {
      fsPlaceholder.parentNode.insertBefore(el, fsPlaceholder);
      fsPlaceholder.remove();
      fsPlaceholder = null;
    }
    btnFs.innerHTML = '⛶';
    fsActive = false;
    // Exit native fullscreen if active
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen || function(){}).call(document);
    }
  }

  btnFs.onclick = function() {
    if (!fsActive) {
      fsPlaceholder = document.createElement('div');
      fsPlaceholder.style.display = 'none';
      el.parentNode.insertBefore(fsPlaceholder, el);
      document.body.appendChild(el);
      el.classList.add('vp-fullscreen');
      btnFs.innerHTML = '✕';
      fsActive = true;

      // Request native fullscreen on the teleported element
      var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
      if (req) req.call(el);

      // Hide controls after 2.5s idle, show on mouse move
      function resetIdle() {
        el.classList.remove('vp-fs-idle');
        clearTimeout(el._fsIdleTimer);
        el._fsIdleTimer = setTimeout(function() {
          if (fsActive) el.classList.add('vp-fs-idle');
        }, 2500);
      }
      el.addEventListener('mousemove', resetIdle);
      el.addEventListener('click', resetIdle);
      el._resetIdle = resetIdle;
      resetIdle();
    } else {
      if (el._resetIdle) {
        el.removeEventListener('mousemove', el._resetIdle);
        el.removeEventListener('click', el._resetIdle);
      }
      exitFs();
    }
  };

  // Also exit our custom FS when browser native FS exits (e.g. user presses Esc)
  document.addEventListener('fullscreenchange', function() {
    if (fsActive && !document.fullscreenElement && !document.webkitFullscreenElement) {
      if (el._resetIdle) {
        el.removeEventListener('mousemove', el._resetIdle);
        el.removeEventListener('click', el._resetIdle);
      }
      exitFs();
    }
  });
  document.addEventListener('webkitfullscreenchange', function() {
    if (fsActive && !document.fullscreenElement && !document.webkitFullscreenElement) {
      if (el._resetIdle) {
        el.removeEventListener('mousemove', el._resetIdle);
        el.removeEventListener('click', el._resetIdle);
      }
      exitFs();
    }
  });

  // Keyboard shortcuts (only when no text input focused)
  function onKey(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key) {
      case ' ': e.preventDefault(); btnPlay.onclick(); break;
      case 'ArrowLeft':  e.preventDefault(); btnRew.onclick(); break;
      case 'ArrowRight': e.preventDefault(); btnFwd.onclick(); break;
      case 'm': case 'M': btnMute.onclick(); break;
      case 'f': case 'F': btnFs.onclick(); break;
      case 'Escape': if (fsActive) { if (el._resetIdle) { el.removeEventListener('mousemove', el._resetIdle); el.removeEventListener('click', el._resetIdle); } exitFs(); } break;
    }
  }
  document.addEventListener('keydown', onKey);

  var destroyed = false;
  function destroy() {
    if (destroyed) return;
    destroyed = true;
    stopPosTimer();
    // If in fullscreen, restore to DOM before destroying
    if (fsActive && fsPlaceholder) {
      el.classList.remove('vp-fullscreen');
      fsPlaceholder.parentNode.insertBefore(el, fsPlaceholder);
      fsPlaceholder.remove();
      fsPlaceholder = null;
      fsActive = false;
    }
    document.removeEventListener('keydown',  onKey);
    document.removeEventListener('mouseup',  onScrubRelease);
    document.removeEventListener('touchend', onScrubRelease);
    vid.pause();
    vid.src = '';
    vid.load();
  }

  // ── Initial load ──
  loadVideo(0);
  fetchDuration();

  return { el: el, vid: vid, statusEl: statusEl, destroy: destroy };
}

// ══════════════ VIDEO LIBRARY ══════════════
var vlibOpen = false, vlibVideos = [], vlibCurrent = null, vlibPlayerInstance = null;

function toggleVideoLib(){
  vlibOpen = !vlibOpen;
  document.getElementById('video-lib-panel').classList.toggle('open', vlibOpen);
  var btn = document.getElementById('video-lib-btn');
  btn.style.borderColor = vlibOpen ? 'var(--gold)' : 'var(--border)';
  btn.style.color       = vlibOpen ? 'var(--gold)' : 'var(--muted)';
  if(vlibOpen && !vlibVideos.length) loadVlibList();
}

function loadVlibList(){
  fetch('/api/videos').then(function(r){ return r.json(); }).then(function(videos){
    vlibVideos = videos;
    document.getElementById('vlib-count').textContent = videos.length + ' video' + (videos.length!==1?'s':'');
    var listEl = document.getElementById('vlib-list');
    if(!videos.length){
      listEl.innerHTML = '<div style="padding:24px 16px;color:var(--muted);font-size:0.78rem;text-align:center;line-height:1.7">Žiadne videá.<br>Nahraj cez Admin panel.</div>';
      return;
    }
    listEl.innerHTML = '';
    videos.forEach(function(v){
      var el = document.createElement('div');
      el.className = 'vlib-item';
      el.innerHTML =
        '<div class="vlib-play-icon">▶</div>'+
        '<div class="vlib-info">'+
          '<div class="vlib-name">'+vlibEsc(v.stem)+'</div>'+
          '<div class="vlib-tags">'+
            '<span class="vtag '+(v.native?'vtag-n':'vtag-v')+'">'+(v.native?'Native':'VLC')+'</span>'+
            '<span class="vtag vtag-s">'+vlibEsc(v.ext)+'</span>'+
            '<span class="vtag vtag-s">'+v.size_mb+'MB</span>'+
          '</div>'+
        '</div>';
      el.onclick = function(){ openVlibVideo(v, el); };
      listEl.appendChild(el);
    });
  }).catch(function(e){
    document.getElementById('vlib-list').innerHTML =
      '<div style="padding:20px;color:#c0392b;font-size:0.75rem;">Error: '+e.message+'</div>';
  });
}

function openVlibVideo(v, el){
  document.querySelectorAll('.vlib-item').forEach(function(i){ i.classList.remove('active'); });
  if(el) el.classList.add('active');
  vlibCurrent = v;
  document.getElementById('vlib-modal-title').textContent = v.stem;
  document.getElementById('vlib-modal-overlay').style.display = 'block';
  document.getElementById('vlib-modal').style.display = 'flex';

  // Destroy previous player if any
  if(vlibPlayerInstance) { vlibPlayerInstance.destroy(); vlibPlayerInstance = null; }
  var container = document.getElementById('vlib-player-container');
  container.innerHTML = '';

  var b64key = v.stream_url.replace('/stream/', '');

  vlibPlayerInstance = makeVideoPlayer({
    streamSrc: v.stream_url,
    directSrc: v.url,
    isNative:  v.native,
    b64key:    b64key,
    maxHeight: '60vh',
  });
  container.appendChild(vlibPlayerInstance.el);

  var statusEl = document.getElementById('vlib-status');
  statusEl.textContent = '';

  document.getElementById('vlib-btn-fs').onclick = function(){
    var target = vlibPlayerInstance ? vlibPlayerInstance.el : container;
    (target.requestFullscreen || target.webkitRequestFullscreen || function(){}).call(target);
  };
  document.getElementById('vlib-btn-copy').onclick = function(){
    var url = window.location.origin + v.stream_url;
    navigator.clipboard.writeText(url).then(function(){
      statusEl.textContent = '✓ URL copied';
      setTimeout(function(){ statusEl.textContent = ''; }, 2000);
    }).catch(function(){ window.prompt('Stream URL:', url); });
  };
}

function vlibStartDirect(vid, url, statusEl){
  vid.src = url; vid.load(); vid.play().catch(function(){});
  if(statusEl){ statusEl.textContent=''; statusEl.style.color=''; }
}

function vlibStartStream(vid, url, statusEl){
  vid.src = url; vid.load();
  if(statusEl){ statusEl.textContent='Transcoding via ffmpeg...'; statusEl.style.color='#f96900'; }
  vid.addEventListener('playing', function(){
    if(statusEl){ statusEl.textContent='Streaming (transcoded on server)'; statusEl.style.color='#27ae60'; }
  }, { once: true });
  vid.addEventListener('error', function(){
    if(statusEl){ statusEl.textContent='Error — ffmpeg/VLC not installed on server?'; statusEl.style.color='#e74c3c'; }
  }, { once: true });
  vid.play().catch(function(){});
}

function vlibStopMSE(){
  // No-op: kept for compatibility
}

function closeVlibModal(){
  if(vlibPlayerInstance){ vlibPlayerInstance.destroy(); vlibPlayerInstance = null; }
  document.getElementById('vlib-player-container').innerHTML = '';
  document.getElementById('vlib-modal-overlay').style.display='none';
  document.getElementById('vlib-modal').style.display='none';
  document.querySelectorAll('.vlib-item').forEach(function(i){ i.classList.remove('active'); });
  vlibCurrent=null;
}
document.addEventListener('keydown', function(e){
  if(e.key==='Escape' && document.getElementById('vlib-modal').style.display==='flex') closeVlibModal();
});
function vlibEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
// ═══════════════════════════════════════════
// ── Boot ──────────────────────────────────────────
applyLang();
load();

})();
</script>

<div id="vlib-modal-overlay" onclick="closeVlibModal()"></div>
<div id="vlib-modal">
  <div id="vlib-modal-header">
    <div id="vlib-modal-title">—</div>
    <button id="vlib-modal-close" onclick="closeVlibModal()">×</button>
  </div>
  <div id="vlib-player-container" style="background:#000;"></div>
  <div id="vlib-modal-bar">
    <div id="vlib-status"></div>
    <button class="vlib-act-btn" id="vlib-btn-copy">📋 Copy URL</button>
    <button class="vlib-act-btn" id="vlib-btn-fs">⛶ Fullscreen</button>
  </div>
</div>
</body>
