# Caddyfile — automatic HTTPS reverse proxy for Travel Archive
# Replace travel.example.com with your actual domain.
# Caddy automatically obtains and renews a Let's Encrypt certificate.
#
# Usage:
#   1. Point your domain's DNS A record at this server's IP
#   2. Uncomment the caddy service in docker-compose.yml
#   3. Edit the domain below
#   4. Run:  docker compose up -d

travel.example.com {
    # Proxy everything to the Python server
    reverse_proxy travel-archive:8000

    # Security headers
    header {
        X-Frame-Options SAMEORIGIN
        X-Content-Type-Options nosniff
        Referrer-Policy no-referrer-when-downgrade
        -Server
    }

    # Increase timeouts for large video streaming
    @streaming path /stream/* /media/*
    handle @streaming {
        reverse_proxy travel-archive:8000 {
            transport http {
                read_timeout  0
                write_timeout 0
            }
        }
    }

    log {
        output file /var/log/caddy/access.log {
            roll_size 10mb
            roll_keep 5
        }
    }
}